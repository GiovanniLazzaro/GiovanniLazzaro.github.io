# Site Settings
locale                   : "en-US"
title                    : "Giovanni Lazzaro"
title_separator          : "-"
name                     : &name "Giovanni Lazzaro"
description              : &description "Neurophysiology Technician & PhD Student in Neuroscience"
url                      : https://giovannilazzaro.github.io
baseurl                  : ""
repository               : "GiovanniLazzaro/GiovanniLazzaro.github.io"

# Site Author
author:
  name             : "Giovanni Lazzaro"
  avatar           : "profile.jpg"
  bio              : "Turning coffee into clinical data & Syntax Errors. Clinical Neurophysiologist Technician · Neuroscience PhD student @ UniPD · Research Assistant at S.Camillo IRCCS, Venice."
  location         : "Venice, Italy"
  employer         : "IRCCS San Camillo"
  osf              : "https://osf.io/user/mdjgu"
  googlescholar    : "https://scholar.google.com/citations?user=OybzmwUAAAAJ&hl=it"
  email            : "giovanni.lazzaro@hsancamillo.it"
  researchgate     : "https://www.researchgate.net/profile/Giovanni-Lazzaro"
  github           : "GiovanniLazzaro"
  linkedin         : "giovanni-lazzaro-32b295175"
  orcid            : "https://orcid.org/0009-0000-9304-902X"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - Rakefile
  - README
  - tmp
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Outputting
permalink: /:categories/:title/
timezone: Europe/Rome

# Plugins
gems:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# mimic GitHub Pages with --safe
whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-redirect-from

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
